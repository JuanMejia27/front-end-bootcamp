        //Metodos de String
        var texto = "Hola Mundo";

        var b = texto.search("d");//search devuelve la posicion de la primera ocurrencia del texto especificado, de lo contrario devuelve -1

        var c = a.replace("JavaScript", "JS");// replace devuelve una nueva cadena con las coincidencias del texto especificado reemplazadas por el nuevo texto especificado
