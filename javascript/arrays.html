<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //arrays son arreglos o listas de elementos, pueden contener cualquier tipo de dato, como numeros, cadenas de texto, objetos, etc. Se definen utilizando corchetes [] y los elementos se separan por comas.
        var array = [10, 20, 30, 40, 50, 60, 70];//Es un array de 7 elementos, con indices del 0 al 6
        document.write(array);//se imprime el array completo, pero se puede acceder a cada elemento por su indice, por ejemplo: document.write(array[5]); //imprime el elemento en el indice 5, que es 60
        document.write("<br>");
        document.write(array[5]+"<br><br>");
        document.write("<ul>");//se abre una lista desordenada para imprimir cada elemento del array en una nueva linea
        for(var i = 0; i < array.length; i++){//se recorre el array desde el indice 0 hasta el indice 6, utilizando la propiedad length para determinar el numero de elementos del array
            document.write("<li>" + array[i] + "</li>");//imprime cada elemento del array en una nueva linea, utilizando la etiqueta <li> para crear un elemento de lista
        }
        document.write("</ul>");

        //modificar o eliminar elementos de un array
        var a = ["Joel", 70, "Dev"];
        document.write(a + "<br>");
        a[0] = "Carlos";
        document.write(a + "<br>");
        delete a[1];
        document.write(a + "<br>");
        document.write(a[1] + "<br>");

        //Sirt y el reverse
        document.write("<br>");
        var b = ["Joel", "Carlos", "Ana", "Maria", "Pedro", "Ale"];
        document.write(b + "<br>");
        b.sort();//ordena los elementos del array en orden alfabetico
        document.write(b + "<br>");
        b.reverse();//invierte el orden de los elementos del array
        document.write(b + "<br><br>");

        //Los metodos pop y push se utilizan para agregar o eliminar elementos al final de un array
        var c = ["Anakin", "Luke", "Obi-Wan", "Leia"];
        document.write(c + "<br>");
        c.pop();//elimina el ultimo elemento del array, que es "Leia"
        document.write(c + "<br>");
        c.push("Han Solo");//agrega un nuevo elemento al final del array, que es "Han Solo"
        document.write(c + "<br><br>");

        //El metodo shift y unshift se utilizan para agregar o eliminar elementos al inicio de un array
        var d = [1, 2, 3, 4, 5];
        document.write(d + "<br>");
        d.shift();//elimina el primer elemento del array, que es 1
        document.write(d + "<br>");
        d.unshift(0);//agrega un nuevo elemento al inicio del array, que es 0
        document.write(d + "<br><br>");

        //El metodo concatenate se utiliza para unir dos o mas arrays en uno solo
        var e = ["Anakin", "Obi-Wan"];
        var f = [40, 60];
        var g = e.concat(f);//une los elementos de los arrays e y f en un nuevo array g, que contiene todos los elementos de ambos arrays
        document.write(g + "<br>"); 
        var h = g.join(" *");//une los elementos del array g en una cadena de texto, utilizando un espacio como separador entre los elementos
        document.write(h + "<br><br>");

        //El metodo slice y splice se utilizan para extraer o modificar elementos de un array
        var i = ["Joel", "Carlos", "Ana", "Maria", "Pedro"];
        document.write(i + "<br>");
        var j = i.slice(2);//extrae los elementos del array i desde el indice por ejemplo 0 hasta el indice 3, y los devuelve en un nuevo array j
        document.write(j + "<br>");
        i.splice(2, 0, "Ale", "Sofia");//modifica el array i eliminando el elemento en el indice 2, que es "Ana", y agregando un nuevo elemento "Ale" en su lugar
        document.write(i + "<br><br>");

        //El metodo isArray se utiliza para verificar si una variable es un array o no
        var k = ["Joel", "Carlos", "Ana"];
        document.write(Array.isArray(k) + "<br>");//imprime true si k es un array, false en caso contrario  
        var l = "Hola Mundo";
        var m = Array.isArray(l);
        document.write(m + "<br>");
        if(Array.isArray(l)){
            document.write("l es un array");
        }else{
            document.write("l no es un array");
        }

        //EL metodo indexOf se utiliza para buscar un elemento en un array y devuelve su indice, o -1 si no se encuentra
        var n = ["Joel", "Carlos", "Ana", "Maria", "Pedro"];
        document.write("<br><br>" + n + "<br>");
        var m = n.indexOf("Maria", 4);//busca el elemento "Maria" en el array n y devuelve su indice, que es 3 si se encuentra, o -1 si no se encuentra. El segundo parametro 4 indica que la busqueda comenzara desde el indice 4, es decir, se buscara "Maria" a partir del indice 4 en adelante
        document.write(m + "<br><br>");

        //El metodo forEach se utiliza para recorrer los elementos de un array y ejecutar una funcion para cada elemento
        var nombres = ["Joel", "Carlos", "Ana", "Maria", "Pedro"];
        nombres.forEach(loop); //recorre el array nombres y ejecuta la funcion loop para cada elemento del array, pasando el valor del elemento y su indice como parametros a la funcion loop
            function loop(valor, indice){//la funcion loop recibe dos parametros, valor e indice, que representan el valor del elemento actual y su indice en el array, respectivamente
            document.write(indice + "   " + valor + "<br>");//
        }

        //Metodos ToString, valueOf y fill
        var o = [70, 30, 50];
        document.write("<br><br>" + o + "<br>");
        /*o.toString();//convierte el array o en una cadena de texto, separando los elementos por comas
        document.write(o + "<br>");        
        o.valueOf();//devuelve el valor primitivo del array o, que es el propio array
        document.write(o + "<br>");*/
        o.fill("hola");//rellena todos los elementos del array o con el valor "hola"

        //El metodo Include se utiliza para verificar si un elemento existe en un array y devuelve true o false
        var p = [10, 50, 70, 90, 20];
        document.write("<br><br>" + p + "<br>");
        var q = p.includes("50");//verifica si el elemento 50 existe en el array p y devuelve true si se encuentra, o false si no se encuentra
        document.write(q + "<br>");

        //El metodo some y every se utilizan para verificar si al menos un elemento o todos los elementos de un array cumplen una condicion, respectivamente
        var r = [10, 2, 3, 4, 20];
        document.write("<br><br>" + r + "<br>");
        //var s = r.some(checkvalue);//verifica si al menos un elemento del array r es mayor que el valor ingresado, utilizando la funcion some, que devuelve true si se encuentra al menos un elemento que cumple la condicion, o false si no se encuentra ningun elemento que cumpla la condicion
        var s = r.every(checkvalue);//verifica si todos los elementos del array r son mayores que el valor ingresado, utilizando la funcion every, que devuelve true si todos los elementos cumplen la condicion, o false si al menos un elemento no cumple la condicion
        document.write(s + "<br>");

        function checkvalue(edad){
            return edad >= 30;
        }

        //El metodo Find y findIndex se utilizan para buscar un elemento en un array que cumpla una condicion y devuelve el elemento encontrado o su indice, respectivamente
        var t = [20, 22, 30, 18, 20];
        document.write("<br><br>" + t + "<br>");
        //var u = t.find(checkvalue);//busca el primer elemento del array t que es mayor o igual al valor ingresado, utilizando la funcion find, que devuelve el elemento encontrado si se encuentra, o undefined si no se encuentra ningun elemento que cumpla la condicion
        var u = t.findIndex(checkvalue);//busca el indice del primer elemento del array t que es mayor o igual al valor ingresado, utilizando la funcion findIndex, que devuelve el indice del elemento encontrado si se encuentra, o -1 si no se encuentra ningun elemento que cumpla la condicion
        document.write(u + "<br>");

        function checkvalue(edades){
            return edades >= 28;
        }

        //El metodo filter se utiliza para crear un nuevo array con los elementos de un array que cumplen una condicion
        var v = [50, 25, 30, 15, 20];
        document.write("<br><br>" + v + "<br>");
        var w = v.filter(checkvalue);
        document.write(w + "<br>");
        function checkvalue(num){
            return num <= 25;
        }
        </script>
    </body>
</html>
