<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <!-- Los etiquetas principales para crear tablas en HTML son <table> (contenedor), <tr> (fila), <th> (celda de encabezado) y <td> (celda de datos). 
        Estructura Básica de la Tabla
        <table>: Define el inicio y fin de la tabla, actuando como contenedor principal.
        <tr>: Establece una fila dentro de la tabla. 
        <th>: Crea celdas de encabezado (texto en negrita y centrado por defecto).
        <td>: Define celdas de datos estándar para el contenido. -->
<body>
    <table border="1" width="300" align="center" bgcolor="lightgreen"> <!-- Atributos de la tabla: border (borde), width (ancho), align (alineación) y bgcolor (color de fondo) -->
        <tr><!-- Fila de encabezado -->
            <th>Num#</th><!-- Celda de encabezado -->
            <th>Nombre</th>
            <th>Edad</th>
        </tr>
        <tr>
            <td>1</td><!-- Celda de datos -->
            <td>Juan Mejia</td>
            <td>31</td>
        </tr>
        <tr>
            <td>2</td>
            <td>María García</td>
            <td>30</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Carlos López</td>
            <td>28</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Ana Martínez</td>
            <td>22</td>
        </tr>
    </table>
</body>
</html>
