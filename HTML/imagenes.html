<!DOCTYPE html>
<html lang="esp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--<img src="ruta/a/la/imagen.jpg" alt="Descripción de la imagen"/> El atributo alt proporciona una descripción de la imagen cuando la imagen no se carga -->
    <img src="imagenes/imagen.jpg" alt="esta es una imagen" width="300" height="200" /> <!-- Atributos width y height para controlar el tamaño de la imagen -->
    <img src="imagenes/imagen2.jpg" alt="segunda imagen" width="300" height="200" /> <!-- Si la ruta de la imagen es incorrecta, se mostrará el texto alternativo -->
    <img src="imagenes/imagen3.jpg" alt="" width="300" height="200" />
</body>
</html>
