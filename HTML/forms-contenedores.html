<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
</head>
<body>
    <form action="">    
        <label for="nombres">Nombres:</label><br><!-- El atributo for en la etiqueta label se utiliza para asociar la etiqueta con un elemento de formulario específico, lo que mejora la accesibilidad y usabilidad del formulario -->  
        <input type="text"  value=username><!-- El atributo value se utiliza para establecer un valor predeterminado para un campo de entrada --><br>
        <label for="apellidos">Apellidos:</label><br>
        <input type="text" value=lastname><br> 
        <button type="submit">Enviar</button><!-- El atributo type se utiliza para especificar el tipo de botón, en este caso, un botón de envío que envía los datos del formulario al servidor -->
    </form>
</body>
</html>
