<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- 
    Las etiquetas principales para listas en HTML son <ul> (lista desordenada), <ol> (lista ordenada) y <dl> (lista de definición), las cuales requieren el uso de la etiqueta <li> para cada elemento individual en las listas desordenadas y ordenadas. 

    <ul>: Define una lista desordenada donde los elementos se muestran con viñetas (puntos) y el orden no es específico. 
    <ol>: Define una lista ordenada donde los elementos se muestran con números o letras en una secuencia específica. 
    <li>: Representa cada elemento de la lista y debe estar contenido dentro de un <ul> o <ol>. 
    <dl>: Define una lista de definición, ideal para términos y sus definiciones (como un glosario), utilizando las etiquetas <dt> para el término y <dd> para la descripción. 
    <dt> y <dd>: Se utilizan exclusivamente dentro de una lista de definición (<dl>) para estructurar pares de término y descripción.
-->
<body>
    <ul><!-- Lista desordenada -->
        <li>Manzana</li><!-- Cada elemento de la lista se define con la etiqueta <li> -->
        <li>Plátano</li>
        <li>Naranja</li>
        <li>Uva</li>
        <li>Fresa</li>
    </ul>
    <ol type="A"> <!-- Lista ordenada, El atributo type="A" muestra los elementos con letras en mayúscula -->
        <li>Cafe</li>
        <li>Te</li>
        <li>Agua</li>
        <li>Jugo</li>
        <li>Leche</li>
    </ol>
    <dl align="left"> <!-- Lista de definición -->
        <dt>HTML</dt><!-- Término -->
        <dd>Lenguaje de marcado para crear páginas web.</dd><!-- Descripción -->
        <dt>CSS</dt>
        <dd>Lenguaje de estilos para diseñar páginas web.</dd>
        <dt>JavaScript</dt>
        <dd>Lenguaje de programación para agregar interactividad a las páginas web.</dd>
    </dl>

</body>
</html>
