<!DOCTYPE html>
<html lang="espanol">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="usuario">Usuario:</label><br>
        <input type="text" id="usuario" name="usuario" value="username" readonly><br><!-- readonly: el usuario no puede modificar el valor del campo, pero sí puede seleccionarlo y copiarlo. -->
        <label for="contrasena">Contraseña:</label><br>
        <input type="password" id="contrasena" name="contrasena" value="password" size="40"><br><!-- size: especifica el ancho del campo en caracteres. -->
        <label for="correo">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" value="user@example.com" disabled><br><!-- disabled: el usuario no puede modificar ni seleccionar el valor del campo -->

    </form>
</body>
</html>
