<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
</head>
<body>
    <form action="">
        <label for="username">Usuario</label><br>
        <input type="text" value="nombre"  /><br><!--Atributo para ingresar texto-->
        <label for="password">Contraseña</label><br>
        <input type="password" value="contraseña"/><br><!--Atributo para ocultar el texto ingresado en el campo de contraseña-->
        <label for="email">Correo</label><br>
        <input type="email" value="correo@example.com"/><br><!--Atributo para validar el formato de correo-->
        <label for="gender">Género</label>
        <input type="radio" name="genero" id="Masculino"/><!--Atributo para seleccionar una opción--><
        <label for="Masculino">Masculino</label>
        <input type="radio" name="genero" id="Femenino"/>
        <label for="Femenino">Femenino</label>
        
        <br>
        <label for="">Pasatiempos</label>
        <label for="">Deportes</label>
        <input type="checkbox"/>
        <label for="">Música</label>
        <input type="checkbox"/>
        <label for="">Lectura</label>
        <input type="checkbox"/><!--Atributo para seleccionar varias opciones--><
        <br>

        <label for="">Fecha de nacimiento</label>
        <input type="date" name="" id=""/><br><!--Atributo para seleccionar una fecha-->
        <label for="">Fecha y hora</label>
        <input type="datetime-local" name="" id=""/><!--Atributo para seleccionar fecha y hora--><br>
        <input type="time"/><br><!--Atributo para seleccionar una hora-->
        <label for="">color</label>
        <input type="color"/><!--Atributo para seleccionar un color--><
        <br>

        <label for="">Enviar CV</label>
        <input type="file"/><!--Atributo para subir archivos-->
        <br>
        <label for="">Numero de teléfono</label>
        <input type="number" name="" id=""/>
        <br><!--Atributo para validar el formato de número-->
        <label for="">Teléfono</label>
        <input type="tel" name="" id=""/>
        <br><!--Atributo para validar el formato de número de teléfono-->
        <label for="">Busqueda</label>
        <input type="search" name="" id=""/><!--Atributo para realizar búsquedas-->
        <br>
        <label for="">Selecciona la semana</label>
        <input type="week" name="" id=""/><!--Atributo para seleccionar una semana-->
        <br>
        <label for="">Diereccion web</label>
        <input type="url" name="" id=""/><!--Atributo para validar el formato de URL-->
        <br>
        <label for="">Restablecer</label>
        <input type="reset" name="" id=""/><!--Atributo para restablecer los campos del formulario a sus valores iniciales--><
        <br>
        <input type="submit" value="Enviar"/>
    </form>
</body>
</html>
