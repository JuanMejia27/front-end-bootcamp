<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 30px;
        }
        a{
            width: 50px;
            height: 30px;
            margin: 30px 0  0 30px;
            padding: 5px;
            border: 3px solid greenyellow;
            text-decoration: none;/*Elimina el subrayado de los enlaces.*/
            color: rgb(224, 11, 11);
            text-transform: uppercase;/*Convierte el texto a mayúsculas.*/
            background-color: blue;
            transition: 0.5s;/*La propiedad CSS transition es una forma de crear animaciones suaves entre los cambios de estilo de un elemento. Permite especificar la duración, el tipo de transición y las propiedades que se deben animar cuando cambian.*/
            /*border-radius: 10px 10px 10px 10px;La propiedad CSS border-radius se utiliza para redondear las esquinas de un elemento. Puedes especificar un valor para cada esquina o un valor único para todas las esquinas. En este caso, el primer valor (10px) se aplica a la esquina superior izquierda, el segundo valor (10px) se aplica a la esquina superior derecha, el tercer valor (10px) se aplica a la esquina inferior derecha y el cuarto valor (10px) se aplica a la esquina inferior izquierda.*/
            border-radius: 10px 20px 30px 40px;/*En este caso, el primer valor (10px) se aplica a la esquina superior izquierda, el segundo valor (20px) se aplica a la esquina superior derecha, el tercer valor (30px) se aplica a la esquina inferior derecha y el cuarto valor (40px) se aplica a la esquina inferior izquierda.*/
        }
        a:hover{/*El selector :hover se utiliza para aplicar estilos a un elemento cuando el usuario pasa el cursor sobre él. Es comúnmente utilizado para cambiar el estilo de los enlaces cuando se les hace hover, pero también puede aplicarse a otros elementos HTML.*/
            background-color: brown;
            color: chartreuse;
            border: 3px solid pink;
        }
    </style>
</head>
<body>
    <a href="">Home</a>
</body>
</html>
