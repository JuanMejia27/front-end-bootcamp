<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        form{
            margin-left: 50px;
        }
        input{
            outline: none;/*El outline se refiere a la línea que aparece alrededor del input cuando está seleccionado */
        }
        input:focus {/*El input focus se refiere al estado en que el input tiene el foco es decir cuando está seleccionado */
            background-color: lightblue;
            color: green;
        }
        input[type="checkbox"]:checked {/*El input checkbox checked se refiere al estado en que el checkbox está marcado */
            box-shadow: 0px 0px 10px 5px red;
        }
        input:disabled {/*El input disabled se refiere al estado en que el input está deshabilitado */
            background-color: lightgray;
        }
        input:required {/*El input required se refiere al estado en que el input es obligatorio */
            border: 2px solid green;
        }
        input:invalid {/*El input invalid se refiere al estado en que el input no cumple con las reglas de validación */
            box-shadow: 0px 0px 10px 5px red;
        }
        .textinput:read-only {/*El input read-only se refiere al estado en que el input es de solo lectura */
            color: green;
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <form action="">
        <label for="usuario">Usuario</label><br/>
        <!-- <input type="text" id="usuario" placeholder="Ingrese su usuario" disabled/> -->
        <input type="text" id="usuario" placeholder="Ingrese su usuario" readonly class="textinput"/>
        <br/>
        
        <label for="password">Contraseña</label><br/>
        <input type="password" id="password" placeholder="Ingrese su contraseña" required/><br/>
        
        <label for="email">Correo</label><br/>
        <input type="email" id="email" placeholder="Ingrese su correo" required/><br/>
        
        <label>Pasatiempos</label>
        <label for="futbol">Futbol</label>
        <input type="checkbox" id="futbol"/>
        
        <label for="basquetbol">Basquetbol</label>
        <input type="checkbox" id="basquetbol"/>
        
        <label for="tenis">Tenis</label>
        <input type="checkbox" id="tenis"/><br/>
        
        <label for="numero">Numero</label><br/>
        <input type="number" id="numero" placeholder="Ingrese un número" required/><br/>
        
        <input type="submit" value="Enviar"/>
    </form>
</body>
</html>
