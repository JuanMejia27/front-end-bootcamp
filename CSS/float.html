<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .only{
            background-color: pink;
        }
        #ache1{
            float: left;
        }
        .ache2{
            float: left;/*con esta propiedad el elemento se va a la izquierda, y el siguiente elemento se va a colocar a su lado izquierdo, pero si no hay espacio suficiente el siguiente elemento se va a colocar debajo del elemento flotante*/
        }
    </style>
</head>
<body>
    <div class="only">
        <h1 id="ache1">Hola desde un H1</h1>
        <h1 class="ache2">este es un segundo H1</h1>
    </div>
</body>
</html>
