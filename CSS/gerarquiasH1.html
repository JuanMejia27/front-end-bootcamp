<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Introduccion a CSS</title>
    <style>/*Se separa el CSS de la estructura HTML se recomienda que se use en un archivo externo */
        h2{
            color: red;
            background-color: rgba(27, 231, 180, 0.911);
        }
    </style>
</head>
<body>
    <h1 style="color:aqua; background-color: green;">Hola mundo</h1><!--Se puede usar el atributo style para agregar estilos en linea pero no es recomendable -->
    <h2>Hola mundo desde un H2</h2><!-- Se puede usar el style desde el head separado del HTML pero no es muy recomendable-->
    <h3>Como estan</h3><!-- Se puede usar un archivo externo para separar el CSS del HTML y es lo recomendado -->
</body>
</html>
