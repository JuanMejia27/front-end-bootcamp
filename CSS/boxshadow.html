<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 30px;
        }
        div{
            width: 400px;
            height: 200px;
            margin: 50px 10px;
            border: 2px solid greenyellow;
            border-radius: 30px;
            box-shadow: 0px 0px 20px 2px greenyellow;/* se refiere a las 4 direcciones, el color es el mismo que el borde para que se vea como un resplandor, en caso de 10px 10px 0 0 una sombra abajo a la derecha */
            transition: 0.3s;
        }
        div:hover {
            box-shadow: 0px 0px 20px 2px rgb(11, 21, 105);
        }
        div p {
            padding: 10px;
        }
    </style>
</head>
<body>
    <div>
        <p>
            Lorem ipsum, dolor sit amet consectetur adipisicing elit. Eligendi, suscipit veniam? Consequatur, enim. Quo facere, qui sint dolor natus voluptatibus!
        </p>
    </div>
</body>
</html>
