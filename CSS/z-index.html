<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        img{
            width: 200px;
            height: 200px;
            position: absolute;
            z-index: -1;/*Con esta propiedad se puede colocar un elemento por debajo de otro, en este caso la imagen se coloca por debajo del texto, si se coloca un numero positivo se colocaria por encima del texto*/
        }
    </style>
</head>
<body>
    <img src="C:\Proyectos\bootcamp\CSS\z-index.html" alt="">
    <h1>Hola este esta es una propiedad de z-index</h1>
</body>
</html>
