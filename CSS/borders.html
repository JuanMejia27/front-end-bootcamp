            border-right: 20px solid rgb(40, 10, 209);  Establece un borde derecho de 20 píxeles de ancho, estilo dotted (punteado) 
            border-top: 20px solid rgb(211, 52, 4);
            border-bottom: 20px double rgb(6, 180, 0);  Establece un borde inferior de 20 píxeles de ancho, estilo double (doble línea) 
            */
        }

</head>
