<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *
        {
            margin: 0;
            padding: 0;
        }
        a {
            text-decoration: overline;/* Agrega una línea sobre el texto del enlace */       
            /*text-decoration: overline;       
            text-decoration: line-through;*/
        }
        h1 {
            text-decoration: underline;/* Agrega una línea debajo del texto del encabezado */
        }
        
    </style>
</head>
<body>
    <a href="">Pagina de inicio</a> <!-- mMestra el texto subrayado como un enlace -->
    <h1>Encabezado con línea debajo</h1><!-- Muestra el texto del encabezado con una línea debajo -->
</body>
</html>
